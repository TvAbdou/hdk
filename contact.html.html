<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact HDK</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* BASE & HEADER IDENTIQUES */
        :root { --primary: #C9BCF1; --secondary: #B9E2CE; --bg-dark: #121212; --bg-card: #1E1E24; --text-main: #ffffff; --text-muted: #999999; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); min-height: 100vh; }
        a { text-decoration: none; color: inherit; }
        
        .top-banner { background-color: #000; color: #888; text-align: center; font-size: 11px; padding: 6px 0; letter-spacing: 1px; font-weight: 500; position: fixed; top: 0; width: 100%; z-index: 1001; }
        .top-banner .dot { display: inline-block; width: 6px; height: 6px; background-color: var(--secondary); border-radius: 50%; margin-right: 8px; box-shadow: 0 0 8px var(--secondary); }
        
        .glass-header { position: fixed; top: 28px; left: 0; right: 0; height: 70px; background: rgba(18, 18, 18, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.05); z-index: 1000; display: flex; align-items: center; }
        .header-container { width: 100%; max-width: 1440px; margin: 0 auto; padding: 0 5%; display: flex; justify-content: space-between; align-items: center; }
        .logo-area { display: flex; align-items: center; gap: 10px; font-size: 20px; font-weight: 700; }
        .badge-beta { background: rgba(255,255,255,0.1); padding: 3px 8px; border-radius: 12px; font-size: 10px; font-weight: 600; }
        
        .nav-links { display: flex; gap: 30px; height: 100%; align-items: center; }
        .nav-links a { font-size: 14px; font-weight: 500; color: var(--text-muted); position: relative; padding: 25px 0; transition: 0.3s; }
        .nav-links a::after { content: ''; position: absolute; bottom: 0; left: 0; width: 0%; height: 2px; background-color: var(--text-main); transition: width 0.3s ease; }
        .nav-links a:hover, .nav-links a.active { color: var(--text-main); }
        .nav-links a:hover::after, .nav-links a.active::after { width: 100%; }
        
        .btn-discord { background: #fff; color: #000; padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 600; }

        /* FORMULAIRE CONTACT */
        main { padding-top: 150px; max-width: 600px; margin: 0 auto; padding-bottom: 100px; padding-left: 5%; padding-right: 5%; }
        .page-title { text-align: center; margin-bottom: 40px; }
        .page-title h1 { font-size: 40px; margin-bottom: 10px; }
        
        .contact-form { background: var(--bg-card); padding: 40px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); }
        .form-group { margin-bottom: 25px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 14px; font-weight: 500; color: var(--text-muted); }
        .form-group input, .form-group textarea { width: 100%; background: #151515; border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 12px 15px; border-radius: 8px; font-family: inherit; transition: 0.3s; }
        .form-group input:focus, .form-group textarea:focus { outline: none; border-color: var(--primary); }
        .form-group textarea { resize: vertical; min-height: 120px; }
        
        .btn-submit { width: 100%; background: #fff; color: #000; border: none; padding: 15px; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .btn-submit:hover { background: var(--primary); }
    </style>
</head>
<body>
    <div class="top-banner"><span class="dot"></span> HDK — VERSION BETA EN COURS DE TEST</div>
    <header class="glass-header">
        <div class="header-container">
            <div class="logo-area"><a href="index.html">HDK.</a><span class="badge-beta">BETA</span></div>
            <nav class="nav-links">
                <a href="index.html">Accueil</a>
                <a href="museum.html">Museum</a>
                <a href="animation.html">Animations</a>
                <a href="projets.html">Projets</a>
                <a href="news.html">News</a>
                <a href="contact.html" class="active">Contact</a>
            </nav>
            <a href="#" class="btn-discord">Discord</a>
        </div>
    </header>

    <main>
        <div class="page-title">
            <h1>Nous <span style="color: var(--primary);">Contacter</span></h1>
        </div>
        
        <form class="contact-form">
            <div class="form-group">
                <label>Pseudo Discord ou Nom</label>
                <input type="text" placeholder="Ex: TV Abdou" required>
            </div>
            <div class="form-group">
                <label>Sujet</label>
                <input type="text" placeholder="Ex: Proposition de projet" required>
            </div>
            <div class="form-group">
                <label>Message</label>
                <textarea placeholder="Votre message..." required></textarea>
            </div>
            <button type="submit" class="btn-submit">Envoyer le message</button>
        </form>
    </main>
</body>
</html>
